# 애플리케이션 이름 설정
spring:
  application:
    name: basic

  # 데이터베이스(MySQL) 연결 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jpa
    username: root
    password: digh1212

  # JPA 및 하이버네이트 설정
  jpa:
    # 실행되는 SQL을 콘솔에 출력
    show-sql: true
    hibernate:
      # create: 앱 실행 시 기존 테이블을 삭제하고 새로 생성
      ddl-auto: create

  # 파일 업로드 관련 설정
  servlet:
    multipart:
      # 하나의 파일 최대 업로드 크기
      max-file-size: 10MB
      # 여러 파일 포함 총 최대 업로드 크기
      max-request-size: 10MB

# 서버 포트 번호 설정
server:
  port: 8080

# 사용자 정의 설정 (JWT 등)
jwt:
  secretKey: test1234